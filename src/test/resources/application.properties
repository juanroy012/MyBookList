# Override DB placeholders (WebMvcTest slices don't create a datasource)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# Disable .env file import so unset env vars don't break test startup
spring.config.import=

# JWT (valid Base64-encoded 256-bit key for tests only)
security.jwt.secret-key=dGVzdC1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2Vz
security.jwt.expiration-time=3600000

# Mail (dummy values so EmailConfiguration bean initialises cleanly)
spring.mail.host=localhost
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=testpass

# Keep context-path empty so test URLs don't need /api/v1 prefix
server.servlet.context-path=

